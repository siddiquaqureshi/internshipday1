<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Learning Layout</title>

 <link rel="stylesheet" href="styl.css"> 
  <!-- You would link your CSS file here, or put the styles in a <style> tag -->
</head>
<body>

  <!-- 1. The Container (Applies Padding, Border, and Margin) -->
  <div class="container">
    
    <!-- 2. The General Box (Applies Colors & Backgrounds) -->
    <div class="box">
      <!-- 3. Text Element (Applies Fonts, Sizes, and Weights) -->
      <h2 class="text-element">Welcome to My Page</h2>
      <p class="text-element">This text is styled using specific fonts and colors.</p>
    </div>

    <!-- 4. The Profile Card (Combines Width, Height, Radius, and Shadow) -->
    <div class="profile-card">
      <h3 class="text-element">John Doe</h3>
      <p class="text-element">Web Developer</p>
      
      <!-- 5. Modern Button (Applies Border Radius & Box Shadow) -->
      <button class="modern-button">Connect</button>
    </div>

  </div>

</body>
</html>
